name: Release Please

on:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: "30 4 * * 1"

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: release-please-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release-please:
    name: Create or update release PR
    runs-on: ubuntu-latest

    steps:
      - name: Run Release Please
        uses: googleapis/release-please-action@v4
        with:
          release-type: node
          package-name: "@nakarthiksurya/talos"
